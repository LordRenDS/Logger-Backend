name: logger-backend

services:
  app:
    build:
      context: .
      dockerfile: docker/php-server.Dockerfile
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    env_file:
      - .env
      - db.env
    environment:
      - LOGFILE_NAME="server-laravel.log"
    depends_on:
      - db

  db:
    image: postgres:18
    env_file:
      - db.env
    volumes:
      - logger-postgres-data:/var/lib/postgresql
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"

volumes:
  logger-postgres-data:
    name: logger-postgres-data
